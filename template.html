<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalks 2026 - Event Schedule</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -0.025em;
        }

        header p {
            margin-top: 0.5rem;
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .search-container {
            margin-bottom: 2rem;
            position: sticky;
            top: 1rem;
            z-index: 10;
        }

        #categorySearch {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        #categorySearch:focus {
            outline: none;
            border-color: var(--primary);
        }

        .schedule {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .talk-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .talk-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .talk-card.break {
            background-color: #f1f5f9;
            border-style: dashed;
        }

        .time-tag {
            display: inline-block;
            background: #dbeafe;
            color: var(--primary-dark);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .talk-title {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .speakers {
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .description {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 1.25rem;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .category-badge {
            background: #f1f5f9;
            color: #475569;
            padding: 0.2rem 0.6rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .category-badge:hover {
            background: var(--primary);
            color: white;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-size: 1.1rem;
            display: none;
        }

        footer {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .talk-card { padding: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>TechTalks 2026</h1>
    <p>Friday, June 5 • Single Track Technical Event</p>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="categorySearch" placeholder="Search talks by category (e.g. Frontend, Backend, AI)...">
    </div>

    <div class="schedule" id="scheduleList">
        <!-- TALKS_JSON_PLACEHOLDER -->
    </div>

    <div id="noResults" class="no-results">
        No talks found matching that category.
    </div>
</div>

<footer>
    &copy; 2026 TechTalks Event Committee. All rights reserved.
</footer>

<script>
    const searchInput = document.getElementById('categorySearch');
    const cards = document.querySelectorAll('.talk-card:not(.break)');
    const noResults = document.getElementById('noResults');

    function filterTalks() {
        const searchTerm = searchInput.value.toLowerCase().trim();
        let visibleCount = 0;

        cards.forEach(card => {
            const categories = card.dataset.categories.toLowerCase();
            if (categories.includes(searchTerm)) {
                card.style.display = 'block';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        noResults.style.display = visibleCount === 0 && searchTerm !== '' ? 'block' : 'none';
    }

    searchInput.addEventListener('input', filterTalks);

    // Allow clicking tags to search
    document.querySelectorAll('.category-badge').forEach(badge => {
        badge.addEventListener('click', () => {
            searchInput.value = badge.textContent;
            filterTalks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
</script>

</body>
</html>
